  .glyph-big{font-family:'Fraunces',serif; font-size:54px; color:var(--gold); line-height:1;}
  #onboarding h1{font-family:'Fraunces',serif; font-weight:600; font-size:28px; margin:0;}
  #onboarding p{color:var(--text-dim); font-size:15px; line-height:1.5; margin:0 0 6px;}
  label.field-label{display:block; text-align:left; font-size:13px; color:var(--text-dim); margin:18px 0 6px; letter-spacing:.03em;}
  input[type="date"], input[type="time"]{
    width:100%; padding:14px 16px; border-radius:14px; border:1px solid var(--card-line);

  }
  button{
    font-family:'Manrope',sans-serif; font-weight:700; font-size:15px; border:none; border-radius:14px;
    padding:15px 18px; cursor:pointer; transition:transform .15s ease, opacity .15s ease;
  }
  button:active{transform:scale(.97);}
  .btn-primary{background:var(--gold); color:#26210F; margin-top:22px;}
  .btn-ghost{background:transparent; border:1px solid var(--card-line); color:var(--text);}
  .btn-row{display:flex; gap:10px; margin-top:10px;}
  .btn-row button{flex:1;}
  .inline-msg{font-size:13px; margin-top:10px; min-height:18px; text-align:left;}
  .inline-msg.error{color:var(--tip);}
  .inline-msg.ok{color:var(--ok);}

  #app{display:none; flex:1; flex-direction:column;}
  .topbar{display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:26px;}

    width:64px; height:64px; border-radius:50%; flex-shrink:0;

  .sign-range{font-size:13px; color:var(--text-dim); margin-top:2px;}

  .quote-card{
    background:var(--card); border:1px solid var(--card-line); border-radius:var(--radius);

  .quote-card::before{

  .quote-author{margin-top:16px; font-size:14px; color:var(--gold-dim); letter-spacing:.04em;}

  .advice-chip{
    margin-top:18px; background:var(--tip-bg); border:1px solid rgba(242,167,160,0.28);

<div class="wrap">

  <div id="onboarding">
    <div class="glyph-big">&#10022;</div>

    <p>One gentle thought and one small tip for your day &mdash; picked for you, every day. Just tell me your birth date once.</p>
    <div>
      <label class="field-label" for="dob">Your date of birth</label>
      <input type="date" id="dob">

    <button class="btn-primary" id="startBtn">Show me today's thought</button>
  </div>

  <div id="app">
    <div class="topbar">
      <div>
        <div class="date-label">Today</div>
        <div class="date-value" id="todayDate">&mdash;</div>
      </div>
      <button class="gear" id="settingsBtn" aria-label="Settings">&#9881;</button>
    </div>

    <div class="sign-block">
      <div class="sign-badge" id="signGlyph">&mdash;</div>
      <div>
        <div class="sign-name" id="signName">&mdash;</div>
        <div class="sign-range" id="signRange">&mdash;</div>
      </div>
    </div>

    <div class="quote-card">
      <div class="quote-text" id="quoteText">Loading&hellip;</div>
      <div class="quote-author" id="quoteAuthor"></div>
      <div class="advice-chip">
        <b>Today's tip:</b> <span id="adviceText"></span>
      </div>
    </div>

    <div class="bottom-actions">
      <button class="btn-ghost" id="testNotifBtn">Test notification</button>
      <button class="btn-ghost" id="newDayBtn">Preview tomorrow</button>

  </div>

  <div id="settings">
    <h2>Settings</h2>
    <div class="sub">366 quotes + tips, one per day of the year (no duplicates).</div>

    <div class="settings-card">
      <label class="field-label" style="margin-top:0">Daily reminder time</label>
      <input type="time" id="reminderTime" value="08:00">

        <button class="btn-primary" id="enableNotifBtn" style="margin-top:14px;">Enable reminder</button>
      </div>

    </div>

    <div class="settings-card">
      <label class="field-label" style="margin-top:0">Your birth date</label>
      <input type="date" id="dobEdit">
      <button class="btn-primary" id="saveDobBtn" style="margin-top:14px;">Save</button>
      <div class="inline-msg ok" id="saveMsg"></div>
    </div>

    <div class="status-line" id="installStatus"></div>

    <div class="close-row btn-row">
      <button class="btn-ghost" id="closeSettingsBtn">Back to today</button>
    </div>
  </div>

</div>

const starsEl = document.getElementById('stars');
for(let i=0;i<45;i++){
  const s = document.createElement('div');
  s.className='star';

  s.style.width = size+'px';

const SIGNS = [
  {name:'Capricorn', glyph:'\u2651', range:'Dec 22 \u2013 Jan 19', offset:0},
  {name:'Aquarius', glyph:'\u2652', range:'Jan 20 \u2013 Feb 18', offset:31},

function getSign(month, day){
  if((month==12&&day>=22)||(month==1&&day<=19)) return SIGNS[0];
  if((month==1&&day>=20)||(month==2&&day<=18)) return SIGNS[1];
  if((month==2&&day>=19)||(month==3&&day<=20)) return SIGNS[2];
  if((month==3&&day>=21)||(month==4&&day<=19)) return SIGNS[3];
  if((month==4&&day>=20)||(month==5&&day<=20)) return SIGNS[4];
  if((month==5&&day>=21)||(month==6&&day<=20)) return SIGNS[5];
  if((month==6&&day>=21)||(month==7&&day<=22)) return SIGNS[6];
  if((month==7&&day>=23)||(month==8&&day<=22)) return SIGNS[7];
  if((month==8&&day>=23)||(month==9&&day<=22)) return SIGNS[8];
  if((month==9&&day>=23)||(month==10&&day<=22)) return SIGNS[9];
  if((month==10&&day>=23)||(month==11&&day<=21)) return SIGNS[10];
  return SIGNS[11];
}

function dayOfYear(d){
  const start = new Date(d.getFullYear(),0,0);
  return Math.floor((d - start)/86400000);
}
function getDayContent(date, signOffset){
  const idx = (dayOfYear(date) + (signOffset||0)) % QUOTES.length;
  const [text, author, advice] = QUOTES[idx];
  return {text, author, advice};
}

const DOB_KEY='dl_dob', NOTIF_KEY='dl_notif_time', LAST_NOTIF_KEY='dl_last_notif';
let previewOffset = 0;

function currentSign(){
  const dobStr = localStorage.getItem(DOB_KEY);
  if(!dobStr) return null;
  const dob = new Date(dobStr+'T00:00:00');
  return getSign(dob.getMonth()+1, dob.getDate());
}

function render(){
  const dobStr = localStorage.getItem(DOB_KEY);
  if(!dobStr){
    document.getElementById('onboarding').style.display='flex';
    document.getElementById('app').style.display='none';
    return;
  }
  document.getElementById('onboarding').style.display='none';
  document.getElementById('app').style.display='flex';

  const sign = currentSign();

  const today = new Date();
  today.setDate(today.getDate()+previewOffset);

  document.getElementById('todayDate').textContent =
    today.toLocaleDateString(undefined,{weekday:'long', month:'long', day:'numeric'});
  document.getElementById('signGlyph').textContent = sign.glyph;
  document.getElementById('signName').textContent = sign.name;
  document.getElementById('signRange').textContent = sign.range;

  const content = getDayContent(today, sign.offset);
  document.getElementById('quoteText').textContent = '"'+content.text+'"';
  document.getElementById('quoteAuthor').textContent = '\u2014 '+content.author;
  document.getElementById('adviceText').textContent = content.advice;
}

document.getElementById('startBtn').addEventListener('click',()=>{
  const v = document.getElementById('dob').value;
  const msg = document.getElementById('dobMsg');
  if(!v){ msg.textContent='Please choose your date of birth.'; return; }
  msg.textContent='';
  localStorage.setItem(DOB_KEY, v);
  render();
});

document.getElementById('settingsBtn').addEventListener('click',()=>{
  document.getElementById('app').style.display='none';
  document.getElementById('settings').style.display='flex';
  document.getElementById('dobEdit').value = localStorage.getItem(DOB_KEY)||'';
  document.getElementById('reminderTime').value = localStorage.getItem(NOTIF_KEY)||'08:00';
  document.getElementById('saveMsg').textContent='';
  updateNotifStatus();
  updateInstallStatus();
});
document.getElementById('closeSettingsBtn').addEventListener('click',()=>{
  document.getElementById('settings').style.display='none';
  render();
});
document.getElementById('saveDobBtn').addEventListener('click',()=>{
  const v = document.getElementById('dobEdit').value;
  const msg = document.getElementById('saveMsg');
  if(!v){ msg.className='inline-msg error'; msg.textContent='Please choose a date.'; return; }
  localStorage.setItem(DOB_KEY, v);
  msg.className='inline-msg ok';
  msg.textContent='Saved.';
});

function updateNotifStatus(){
  const el = document.getElementById('notifStatus');
  if(!('Notification' in window)){
    el.textContent = 'Notifications aren\u2019t available when opening this file directly. Install the app (see below) for full support.';
    return;
  }
  if(Notification.permission === 'granted'){
    el.textContent = 'Notifications enabled. Reminder set for '+(localStorage.getItem(NOTIF_KEY)||'08:00')+'.';
  } else if(Notification.permission === 'denied'){
    el.textContent = 'Notifications are blocked for this app in your phone settings.';
  } else {
    el.textContent = 'Notifications: not yet enabled.';
  }
}
document.getElementById('enableNotifBtn').addEventListener('click', async ()=>{
  localStorage.setItem(NOTIF_KEY, document.getElementById('reminderTime').value);
  if(!('Notification' in window)){ updateNotifStatus(); return; }
  const perm = await Notification.requestPermission();
  updateNotifStatus();
  if(perm==='granted'){ checkAndSendDaily(); }
});

function sendTodayNotification(){
  const today = new Date();
  today.setDate(today.getDate()+previewOffset);
  const sign = currentSign();
  const content = getDayContent(today, sign ? sign.offset : 0);
  const body = '"'+content.text+'" \u2014 '+content.author+'\n'+content.advice;
  if(navigator.serviceWorker && navigator.serviceWorker.controller){
    navigator.serviceWorker.ready.then(reg=>{
      reg.showNotification('Your thought for today \u2726', {body, icon:'icon-192.png'});
    });
  } else if('Notification' in window){
    new Notification('Your thought for today \u2726', { body });
  }
}
document.getElementById('testNotifBtn').addEventListener('click', async ()=>{
  if(!('Notification' in window)){
    document.getElementById('settingsBtn').click();
    return;
  }
  if(Notification.permission !== 'granted'){
    const perm = await Notification.requestPermission();
    if(perm!=='granted'){
      document.getElementById('settingsBtn').click();
      updateNotifStatus();
      return;
    }
  }
  sendTodayNotification();
});

function checkAndSendDaily(){
  if(!('Notification' in window) || Notification.permission!=='granted') return;
  const reminder = localStorage.getItem(NOTIF_KEY);
  if(!reminder) return;
  const now = new Date();
  const todayStr = now.toISOString().slice(0,10);
  const last = localStorage.getItem(LAST_NOTIF_KEY);
  const [h,m] = reminder.split(':').map(Number);
  const target = new Date(); target.setHours(h,m,0,0);
  if(now >= target && last !== todayStr){
    sendTodayNotification();
    localStorage.setItem(LAST_NOTIF_KEY, todayStr);
  }
}

document.getElementById('newDayBtn').addEventListener('click',()=>{
  previewOffset = previewOffset===0 ? 1 : 0;
  document.getElementById('newDayBtn').textContent = previewOffset===0 ? 'Preview tomorrow' : 'Back to today';
  render();
});

render();
checkAndSendDaily();
document.addEventListener('visibilitychange', ()=>{ if(!document.hidden) checkAndSendDaily(); });


let deferredInstallEvent = null;
window.addEventListener('beforeinstallprompt', (e)=>{
  e.preventDefault();
  deferredInstallEvent = e;
});
function updateInstallStatus(){
  const el = document.getElementById('installStatus');
  if(window.matchMedia('(display-mode: standalone)').matches){
    el.textContent = 'Running as an installed app. Daily reminders use this app\u2019s notifications.';
  } else if(deferredInstallEvent){
    el.textContent = 'You can install this as an app from your browser menu (Add to Home screen / Install app).';
  } else {
    el.textContent = 'Open this page in Chrome, then use \u201cAdd to Home screen\u201d / \u201cInstall app\u201d from the menu.';
  }
}
if('serviceWorker' in navigator){
  window.addEventListener('load', ()=>{
    navigator.serviceWorker.register('sw.js').catch(()=>{});
  });
}

updateInstallStatus();
</script>
</body>
</html>
