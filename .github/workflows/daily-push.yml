name: Daily push notifications

on:
  schedule:
    - cron: '30 21 * * *'   # ~7:30am Sydney (AEST, UTC+10)
    - cron: '30 2 * * *'    # ~12:30pm Sydney
    - cron: '30 8 * * *'    # ~6:30pm Sydney
  workflow_dispatch: {}

jobs:
  send:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Send today's push
        env:
          ONESIGNAL_API_KEY: ${{ secrets.ONESIGNAL_API_KEY }}
          ONESIGNAL_APP_ID: "9bfd6645-049b-4635-bba1-a45d02b82b6f"
        run: node .github/scripts/send-push.mjs
